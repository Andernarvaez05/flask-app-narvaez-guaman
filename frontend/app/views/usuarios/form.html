{% extends "base.html" %}
{% block title %}{{ accion }} usuario{% endblock %}
{% block content %}
<div class="page-header">
    <div>
        <h1>{{ accion }} usuario</h1>
        <p class="page-subtitle">Completa los datos del registro</p>
    </div>
</div>

<div class="card form-card">
    <form method="POST">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" value="{{ usuario.nombre if usuario else '' }}" placeholder="Ej. Ana Pérez" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ usuario.email if usuario else '' }}" placeholder="ana@correo.com" required>

        <label for="telefono">Teléfono</label>
        <input type="text" id="telefono" name="telefono" value="{{ usuario.telefono if usuario else '' }}" placeholder="Opcional">

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a class="btn btn-ghost" href="{{ url_for('usuarios.listar') }}">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
