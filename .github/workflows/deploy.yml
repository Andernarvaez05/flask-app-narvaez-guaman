name: Build y Deploy a VPS

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - servicio: backend
            contexto: ./backend
          - servicio: frontend
            contexto: ./frontend
    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push de la imagen ${{ matrix.servicio }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.contexto }}
          push: true
          tags: ghcr.io/${{ github.repository }}-${{ matrix.servicio }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Sustituir nombre real de las imágenes en docker-compose.yml
        run: |
          sed -i "s#OWNER/REPO#${{ github.repository }}#g" docker-compose.yml

      - name: Copiar docker-compose.yml al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "proyecto-devops/app"

      - name: Pull y despliegue en el VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/proyecto-devops/app
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f
