{% extends "base.html" %}
{% block title %}{{ accion }} usuario{% endblock %}
{% block content %}
<div class="form-card">
    <h1>{{ accion }} usuario</h1>
    <form method="POST">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" value="{{ usuario.nombre if usuario else '' }}" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ usuario.email if usuario else '' }}" required>

        <label for="telefono">Teléfono</label>
        <input type="text" id="telefono" name="telefono" value="{{ usuario.telefono if usuario else '' }}">

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a class="btn" href="{{ url_for('usuarios.listar') }}">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
